name: Terraform CD

# Trigger: runs only on push to main (i.e., after a PR is merged).
# Purpose: actually deploy the approved infrastructure changes.
on:
  push:
    branches: [main]
    paths:
      - "terraform/**"

permissions:
  id-token: write
  contents: read

jobs:
  terraform-apply:
    name: Apply infrastructure changes
    runs-on: ubuntu-latest
    environment: production  # optional: adds manual approval gate in GitHub settings

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"

      - name: terraform init
        working-directory: terraform
        run: terraform init

      - name: terraform apply
        working-directory: terraform
        run: |
          terraform apply -auto-approve \
            -var="alert_email=${{ secrets.ALERT_EMAIL }}"
